<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72">
  <rect width="72" height="72" rx="14" fill="#08080f"/>
  <g transform="translate(36,36)" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Hexagon -->
    <polygon points="0,-18 15.6,-9 15.6,9 0,18 -15.6,9 -15.6,-9" opacity="0.9"/>
    <!-- Bond lines extending from alternating vertices -->
    <line x1="0" y1="-18" x2="0" y2="-24"/>
    <line x1="15.6" y1="9" x2="20.8" y2="12"/>
    <line x1="-15.6" y1="9" x2="-20.8" y2="12"/>
    <!-- Molecular nodes at bond endpoints -->
    <circle cx="0" cy="-24" r="2" fill="#34d399" stroke="none"/>
    <circle cx="20.8" cy="12" r="2" fill="#34d399" stroke="none"/>
    <circle cx="-20.8" cy="12" r="2" fill="#34d399" stroke="none"/>
    <!-- Inner double-bond hints -->
    <line x1="-12" y1="-5" x2="-12" y2="5" opacity="0.4" stroke-width="1.5"/>
    <line x1="12" y1="-5" x2="12" y2="5" opacity="0.4" stroke-width="1.5"/>
    <line x1="-4" y1="-15" x2="4" y2="-15" opacity="0.4" stroke-width="1.5"/>
  </g>
</svg>
