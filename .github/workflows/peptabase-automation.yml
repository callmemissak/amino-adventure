name: Peptabase Gmail Automation

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  poll-peptabase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install google-auth-library

      - name: Poll Gmail for peptabase updates
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PEPTABASE_AUTOMATION_SECRET: ${{ secrets.PEPTABASE_AUTOMATION_SECRET }}
        run: |
          node scripts/peptabase-poller.js

      - name: Log workflow result
        if: always()
        run: echo "Peptabase automation completed at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
